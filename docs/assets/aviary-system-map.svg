<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#102F3A"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="aviary" x1="410" y1="108" x2="710" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #B6C6D6; }
      .label { font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; }
      .small { font: 500 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #B6C6D6; }
      .tiny { font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #A7F3D0; letter-spacing: .06em; }
      .box { fill: rgba(15, 23, 42, .78); stroke: rgba(148, 163, 184, .35); stroke-width: 1.2; }
      .provider { fill: rgba(8, 17, 31, .72); stroke: rgba(56, 189, 248, .45); stroke-width: 1.2; }
      .arrow { stroke: #67E8F9; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #34D399; stroke-width: 2; stroke-dasharray: 8 8; stroke-linecap: round; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#67E8F9"/>
    </marker>
    <marker id="greenhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#34D399"/>
    </marker>
  </defs>

  <rect width="1120" height="560" rx="28" fill="url(#bg)"/>
  <circle cx="970" cy="80" r="180" fill="#14B8A6" opacity="0.08"/>
  <circle cx="150" cy="500" r="210" fill="#38BDF8" opacity="0.08"/>

  <text x="56" y="62" class="title">Aviary system map</text>
  <text x="56" y="92" class="subtitle">One backend runtime for many frontend agents and many CLI providers.</text>

  <rect x="58" y="172" width="238" height="184" rx="22" class="box" filter="url(#shadow)"/>
  <text x="86" y="214" class="tiny">CALLERS</text>
  <text x="86" y="248" class="label">Agent products</text>
  <text x="86" y="278" class="small">SaaS backends</text>
  <text x="86" y="304" class="small">Bamboo-style platforms</text>
  <text x="86" y="330" class="small">ChatOps adapters</text>

  <rect x="408" y="132" width="304" height="264" rx="28" fill="url(#aviary)" opacity="0.94" filter="url(#shadow)"/>
  <text x="456" y="188" style="font: 800 40px Inter, ui-sans-serif, system-ui, sans-serif; fill: #052E2B;">Aviary</text>
  <text x="456" y="224" style="font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #083344;">runtime backend</text>
  <rect x="448" y="254" width="224" height="38" rx="12" fill="rgba(8,47,73,.18)"/>
  <text x="468" y="279" style="font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #052E2B;">Session contract</text>
  <rect x="448" y="304" width="224" height="38" rx="12" fill="rgba(8,47,73,.18)"/>
  <text x="468" y="329" style="font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #052E2B;">Sandbox lifecycle</text>
  <rect x="448" y="354" width="224" height="38" rx="12" fill="rgba(8,47,73,.18)"/>
  <text x="468" y="379" style="font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #052E2B;">Normalized events</text>

  <rect x="820" y="88" width="242" height="386" rx="24" class="box" filter="url(#shadow)"/>
  <text x="850" y="130" class="tiny">PROVIDERS</text>
  <rect x="850" y="156" width="182" height="45" rx="14" class="provider"/>
  <text x="874" y="184" class="label">Claude Code</text>
  <rect x="850" y="216" width="182" height="45" rx="14" class="provider"/>
  <text x="874" y="244" class="label">Codex</text>
  <rect x="850" y="276" width="182" height="45" rx="14" class="provider"/>
  <text x="874" y="304" class="label">Gemini CLI</text>
  <rect x="850" y="336" width="182" height="45" rx="14" class="provider"/>
  <text x="874" y="364" class="label">OpenCode</text>
  <rect x="850" y="396" width="182" height="45" rx="14" class="provider"/>
  <text x="874" y="424" class="label">ACP / future</text>

  <path d="M296 264H386" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="238" class="small">HTTP API + SSE</text>
  <path d="M714 264H798" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="724" y="238" class="small">runtime drivers</text>

  <path d="M704 404C620 490 366 482 240 370" class="dash" marker-end="url(#greenhead)"/>
  <text x="386" y="488" class="small">audit, replay, approvals, UI stream</text>

  <rect x="360" y="438" width="400" height="54" rx="18" fill="rgba(15,23,42,.58)" stroke="rgba(45,212,191,.36)"/>
  <text x="394" y="471" class="small">one session -> one sandbox -> one workspace -> one credential context</text>
</svg>
